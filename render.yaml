services:
  - type: web
    name: nutriai-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: ENV
        value: production
      - key: PRO_ENABLED
        value: "false"
      # Fill these in the Render dashboard → Environment tab
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL after deploying frontend
      - key: ADMIN_SECRET
        sync: false
